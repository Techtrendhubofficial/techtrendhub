<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Trend Hub | Trending Essentials</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #111; }
        .hero { 
            height: 70vh; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('hat7.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero-content h1 { font-size: 40px; letter-spacing: 5px; margin: 0; text-transform: uppercase; }
        .hero-content p { font-size: 16px; margin: 20px 0 30px; opacity: 0.8; }
        .shop-btn { background: #fff; color: #000; padding: 12px 35px; text-decoration: none; font-weight: bold; border-radius: 2px; text-transform: uppercase; }
        
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .promo { background: #ff4757; color: white; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { border: 1px solid #eee; text-align: center; padding-bottom: 20px; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card h3 { font-size: 16px; margin: 20px 0 10px; text-transform: uppercase; }
        .price { color: #ff4757; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .buy-link { border: 1px solid #000; color: #000; padding: 10px 20px; text-decoration: none; font-size: 13px; font-weight: bold; }
        .buy-link:hover { background: #000; color: #fff; }

        footer { background: #111; color: #fff; padding: 50px 20px; text-align: center; font-size: 14px; margin-top: 80px; line-height: 1.8; }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <h1>TECH TREND HUB</h1>
        <p>HOT GADGETS • URBAN FASHION • SKINCARE</p>
        <a href="#shop" class="shop-btn">View Collection</a>
    </div>
</section>

<div class="container" id="shop">
    <div class="promo">🔥 LIMITED OFFER: ANY 2 CAPS FOR RM30</div>
    
    <div class="grid">
        <script>
            const hats = [
                "Classic Khaki Cap", "Sport Embroidered Cap", "Star M Snapback", 
                "Brooklyn Two-Tone", "Black Mesh Performance", "NY Street Denim", "Washed Denim Bucket"
            ];
            hats.forEach((name, i) => {
                document.write(`
                    <div class="card">
                        <img src="hat${i+1}.jpg" alt="${name}">
                        <h3>${name}</h3>
                        <div class="price">RM 18 (2 for RM30)</div>
                        <a href="https://wa.me/60166787883?text=Hi+TechTrendHub,I+want+to+order+Hat${i+1}" class="buy-link">WHATSAPP ORDER</a>
                    </div>
                `);
            });
        </script>
    </div>
</div>

<footer>
    <strong>TECH TREND HUB</strong><br>
    WhatsApp: 016-678 7883 (Jocelyn)<br>
    Shah Alam, Selangor | Fast Shipping Malaysia<br>
    © 2026 Tech Trend Hub. All Rights Reserved.
</footer>

</body>
</html>
